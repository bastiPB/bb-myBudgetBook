# nginx.conf — Konfiguration für den Frontend-Container.
#
# Zwei Aufgaben:
#   1. /api/* → Backend-Container weiterleiten (Proxy)
#   2. Alles andere → React-App aus dist/ ausliefern
#
# Diese Datei landet als /etc/nginx/conf.d/default.conf im nginx-Container.

server {
    listen 80;
    # server_name _ = "egal welcher Hostname" — passt zu selbst-gehosteten Setups
    server_name _;

    # Hier liegen die statischen Dateien nach dem Vite-Build
    root /usr/share/nginx/html;
    index index.html;

    # --- API-Anfragen an das Backend weiterleiten ---
    # Alles unter /api/ wird an http://backend:8000/ gesendet.
    # "backend" ist der Service-Name aus docker-compose.yml — Docker löst das intern auf.
    # Das Trailing-Slash nach backend:8000/ ist entscheidend:
    #   /api/auth/login → http://backend:8000/auth/login  (der /api-Prefix wird entfernt)
    location /api/ {
        proxy_pass http://backend:8000/;

        # Original-Host und Client-IP an das Backend weitergeben
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cookies müssen unverändert durchgehen (Session-Auth)
        proxy_pass_header Set-Cookie;
    }

    # --- Alles andere: React-App ausliefern ---
    # try_files prüft der Reihe nach:
    #   $uri       = gibt es die Datei direkt? (z.B. /favicon.svg → ja)
    #   $uri/      = gibt es ein Verzeichnis? (selten nötig)
    #   /index.html = Fallback → React Router übernimmt das Routing im Browser
    #
    # Ohne diesen Fallback würde ein Refresh auf /dashboard einen 404 geben,
    # weil nginx keine Datei "dashboard" kennt — das ist Sache von React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
