# alembic.ini — Konfigurationsdatei für Alembic (das DB-Migrations-Tool).
#
# Alembic liest diese Datei beim Start. Die meisten Werte hier sind Defaults.
# Die Datenbank-URL kommt NICHT von hier, sondern aus unserer app/config.py
# (wird in alembic/env.py gesetzt).

[alembic]
# Pfad zum Migrations-Verzeichnis (relativ zu dieser Datei)
script_location = alembic

# Pfad-Separator für migration_directories (os = Betriebssystem-Standard)
version_path_separator = os

# Dateiname-Muster für neue Migrations-Dateien
# %(year)d-%(month).2d-%(day).2d-%(rev)s_%(slug)s.py  →  2026-04-30-a1b2c3d4_initial_schema.py
file_template = %%(year)d-%%(month).2d-%%(day).2d-%%(rev)s_%%(slug)s

# Python sys.path um das aktuelle Verzeichnis erweitern
# Das erlaubt Alembic, "from app.config import ..." zu importieren
prepend_sys_path = .

# Zeitzone für Timestamps in Migrations-Dateien
timezone = UTC


# --- Logging ---
# Alembic schreibt Logs — hier können Level und Format angepasst werden.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
