version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    labels:
      - "type:dependencies"
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    labels:
      - "type:dependencies"
    open-pull-requests-limit: 5

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - "type:dependencies"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - "type:dependencies"
