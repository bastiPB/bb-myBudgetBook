# docker-compose.dev.yml — Überschreibungen für die lokale Entwicklung.
#
# Diese Datei wird ZUSÄTZLICH zu docker-compose.yml geladen:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up db backend
#
# Was sie ändert:
#   - Backend + Frontend werden lokal gebaut (statt Image von ghcr.io zu ziehen)
#   - Backend-Port 8888 wird nach außen freigegeben
#     → Vite Dev Server braucht das für seinen Proxy (/api/* → localhost:8888)
#
# Was du lokal ausführst:
#   Terminal 1: docker compose -f docker-compose.yml -f docker-compose.dev.yml up db backend
#   Terminal 2: cd frontend && npm run dev

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Port 8888 nach außen freigeben — nur für den Vite-Dev-Proxy nötig.
    # In Produktion (docker-compose.yml) ist dieser Port nicht offen.
    ports:
      - "8888:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
